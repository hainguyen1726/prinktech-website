name: Deploy to VPS (Git-based)

on:
  push:
    branches: [master]
  workflow_dispatch: # Cho phép trigger thủ công từ GitHub UI

env:
  VPS_IP: "180.93.146.26"
  VPS_USER: "root"
  APP_DIR: "/srv/website-prinktech"
  CONTAINER_NAME: "prinktech-website"

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          cat << 'EOF' > ~/.ssh/id_rsa
          ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          EOF
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ env.VPS_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS via Git
        run: |
          ssh ${{ env.VPS_USER }}@${{ env.VPS_IP }} << 'EOF'
            set -e

            echo "📥 Pulling latest code from GitHub..."
            cd ${{ env.APP_DIR }}

            # Backup .env
            if [ -f .env ]; then
              cp .env .env.backup
            fi

            # Run unified deploy script to pull code, build Next.js and recreate container
            bash deploy-vps-git.sh
          EOF

      - name: Verify deployment
        run: |
          echo "🔍 Checking deployment status..."
          ssh ${{ env.VPS_USER }}@${{ env.VPS_IP }} "docker ps | grep ${{ env.CONTAINER_NAME }} && echo 'Container is running' || echo 'Container issue'"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_rsa
